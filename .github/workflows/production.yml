name: production build and deploy

on:
  workflow_dispatch: # for manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [bangkhuwat, suwankhuha, cherngtalay, lamphun, bangrakphatthana]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build:${{ matrix.site }}
        env:
          NEXT_PUBLIC_SITE: ${{ matrix.site }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Prepare folder
        run: |
          mkdir -p dist/${{ matrix.site }}
          cp -r out/* dist/${{ matrix.site }}/

      - name: rsync to production server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: dist/*
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.REMOTE_HOST }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.REMOTE_PRIVATE_KEY }}

      - name: Upload site artifact production
        uses: actions/upload-artifact@v4
        with:
          name: production-${{ matrix.site }}
          path: dist/${{ matrix.site }}
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Download site artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: production-*
          path: dist

      - name: Combine sites
        run: |
          mkdir -p _site
          for dir in dist/production-*; do
            site="${dir#dist/production-}"
            mkdir -p "_site/$site"
            cp -r "$dir"/. "_site/$site/"
          done

      - name: rsync to production server
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: dist/*
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.REMOTE_HOST }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.REMOTE_PRIVATE_KEY }}
