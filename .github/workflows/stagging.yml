name: stagging build and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [bangkhuwat, suwankhuha, cherngtalay, lamphun, bangrakphatthana]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build:${{ matrix.site }}
        env:
          NEXT_PUBLIC_SITE: ${{ matrix.site }}
          BASE_PATH: /kpi-local-budget
          NEXT_PUBLIC_BASE_PATH: /kpi-local-budget
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Prepare folder
        run: |
          mkdir -p dist/${{ matrix.site }}
          cp -r out/* dist/${{ matrix.site }}/

      - name: Upload stagging artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: stagging-${{ matrix.site }}
          path: dist/${{ matrix.site }}
          retention-days: 1

  deploy:
    name: Deploy to Stagging
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stagging-*
          path: dist

      - name: Combine sites
        run: |
          mkdir -p _site
          for dir in dist/stagging-*; do
            site="${dir#dist/stagging-}"
            mkdir -p "_site/$site"
            cp -r "$dir"/. "_site/$site/"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
